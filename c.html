<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f6efe4; /* Matches the warm cream background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            overflow-x: hidden;
            padding: 10px;
        }

        /* Responsive canvas container that preserves your illustration's aspect ratio */
        .wedding-canvas {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 1200 / 830; /* Matches standard landscape art aspect ratio */
            background-image: url('wedding_photo.png'); /* 👈 YOUR IMAGE FILE NAME HERE */
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 45px rgba(110, 82, 65, 0.15);
            border-radius: 12px;
        }

        /* The timer mask container positioned directly over the image's static countdown box */
        .timer-overlay {
            position: absolute;
            top: 45.3%;   /* Perfectly scales and positions on top of the image box */
            left: 31%;    
            width: 58.6%;  
            height: 22.8%; 
            background-color: #fffaf0; /* Perfectly covers the static illustration numbers */
            border: 2px dashed #decbbd;
            border-radius: 18px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 1%;
        }

        .time-segment {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Matches the elegant terracotta font styling of your numbers */
        .time-number {
            font-family: 'Lora', serif;
            font-size: 3.8vw; /* Uses viewport-width scale to resize beautifully with screen */
            font-weight: 400;
            color: #8c5d52;
            line-height: 1;
            margin-bottom: 2%;
        }

        /* Matches the clean, tiny headers underneath the numbers */
        .time-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85vw;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: #9c7b6c;
            text-transform: uppercase;
        }

        /* Decorative heart dividers between the countdown blocks */
        .heart-divider {
            color: #bfa395;
            font-size: 1.1vw;
            margin-bottom: 3.5%;
            user-select: none;
        }

        /* Adjustments for smaller screen devices to keep text crisp */
        @media (max-width: 600px) {
            .time-number { font-size: 4.2vw; }
            .time-label { font-size: 1vw; letter-spacing: 0.05em; }
        }
    </style>
</head>
<body>

    <div class="wedding-canvas">
        
        <div class="timer-overlay">
            <div class="time-segment">
                <div class="time-number" id="months">00</div>
                <div class="time-label">Months</div>
            </div>
            
            <div class="heart-divider">♡</div>

            <div class="time-segment">
                <div class="time-number" id="days">00</div>
                <div class="time-label">Days</div>
            </div>

            <div class="heart-divider">♡</div>

            <div class="time-segment">
                <div class="time-number" id="hours">00</div>
                <div class="time-label">Hours</div>
            </div>

            <div class="heart-divider">♡</div>

            <div class="time-segment">
                <div class="time-number" id="minutes">00</div>
                <div class="time-label">Minutes</div>
            </div>

            <div class="heart-divider">♡</div>

            <div class="time-segment">
                <div class="time-number" id="seconds">00</div>
                <div class="time-label">Seconds</div>
            </div>
        </div>

    </div>

    <script>
        // Target date set exactly to your wedding date: Jan 19, 2027
        const targetDate = new Date("2027-01-19T00:00:00").getTime();

        function updateLiveCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                document.querySelector(".timer-overlay").innerHTML = "<div style='font-size:2vw; color:#8c5d52;'>Our Adventure Begins! ✨</div>";
                clearInterval(intervalId);
                return;
            }

            // Calculations for Time conversions
            const totalSeconds = Math.floor(distance / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);

            // Dynamic calendar breakdown (Average 30.44 days per month)
            const calculatedMonths = Math.floor(totalDays / 30.44);
            const remainingDays = Math.floor(totalDays % 30.44);
            
            const remainingHours = totalHours % 24;
            const remainingMinutes = totalMinutes % 60;
            const remainingSeconds = totalSeconds % 60;

            // Display updates with clean, 2-digit padding formatting
            document.getElementById("months").innerText = String(calculatedMonths).padStart(2, '0');
            document.getElementById("days").innerText = String(remainingDays).padStart(2, '0');
            document.getElementById("hours").innerText = String(remainingHours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(remainingMinutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(remainingSeconds).padStart(2, '0');
        }

        // Initialize and fire interval every single second
        updateLiveCountdown();
        const intervalId = setInterval(updateLiveCountdown, 1000);
    </script>
</body>
</html>
